name: Social Monitor

on:
  schedule:
    # KST 08:00-21:00 hourly
    - cron: "0 23 * * *"
    - cron: "0 0-12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: check sends new posts, seed stores current latest posts only"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - seed

permissions:
  contents: write

concurrency:
  group: social-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_INSTAGRAM_AI_FREAKS: ${{ secrets.DISCORD_WEBHOOK_INSTAGRAM_AI_FREAKS }}
          DISCORD_WEBHOOK_INSTAGRAM_PROMPPY: ${{ secrets.DISCORD_WEBHOOK_INSTAGRAM_PROMPPY }}
          DISCORD_WEBHOOK_INSTAGRAM_AI_AINOW: ${{ secrets.DISCORD_WEBHOOK_INSTAGRAM_AI_AINOW }}
          DISCORD_WEBHOOK_THREADS_CHOI_OPENAI: ${{ secrets.DISCORD_WEBHOOK_THREADS_CHOI_OPENAI }}
          DISCORD_WEBHOOK_YOZM_AI: ${{ secrets.DISCORD_WEBHOOK_YOZM_AI }}
          INSTAGRAM_COOKIE: ${{ secrets.INSTAGRAM_COOKIE }}
        run: npm run ${{ github.event.inputs.mode || 'check' }}

      - name: Commit seen state
        run: |
          if git diff --quiet -- seen.json; then
            echo "seen.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git commit -m "chore: update social monitor seen state"
          git push
